{% extends "base.html" %}

{% block content %}

<h1>Редактировать клиента</h1>

<form method="post" action="/clients/edit/{{ client.id }}" class="edit-form">
    <div class="form-row"><label>Имя</label><input type="text" name="first_name" value="{{ client.first_name or '' }}" required /></div>
    <div class="form-row"><label>Фамилия</label><input type="text" name="last_name" value="{{ client.last_name or '' }}" /></div>
    <div class="form-row"><label>Отчество</label><input type="text" name="patronymic" value="{{ client.patronymic or '' }}" /></div>
    <div class="form-row"><label>Год рождения</label><input type="number" name="birth_year" value="{{ client.birth_year or '' }}" /></div>
    <div class="form-row"><label>Место рождения</label><input type="text" name="birth_place" value="{{ client.birth_place or '' }}" /></div>
    <div class="form-row"><label>Телефон</label><input type="text" name="phone" value="{{ client.phone or '' }}" /></div>
    <!-- кнопка Сохранить находится внутри основной формы -->
    <div class="edit-actions">
        <button class="small-btn" type="submit">Сохранить</button>
    </div>
</form>

<!-- Удаление оставляем отдельной формой -->
<div class="edit-actions">
    <form method="post" action="/clients/delete/{{ client.id }}" onsubmit="return confirm('Удалить клиента?');" style="display:inline">
        <button class="small-btn">Удалить</button>
    </form>
</div>

{% endblock %}
