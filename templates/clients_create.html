{% extends "base.html" %}

{% block content %}

<h1>Новый клиент</h1>

<form method="post" action="/clients/create" class="form">
    {{ csrf_input(request) }}
    <div class="form__group"><label class="form__label">Имя</label><input class="form__input" type="text" name="first_name" value="" required /></div>
    <div class="form__group"><label class="form__label">Фамилия</label><input class="form__input" type="text" name="last_name" value="" /></div>
    <div class="form__group"><label class="form__label">Отчество</label><input class="form__input" type="text" name="patronymic" value="" /></div>
    <div class="form__group"><label class="form__label">Год рождения</label><input class="form__input" type="number" name="birth_year" value="" /></div>
    <div class="form__group"><label class="form__label">Место рождения</label><input class="form__input" type="text" name="birth_place" value="" /></div>
    <div class="form__group"><label class="form__label">Телефон</label><input class="form__input" type="text" name="phone" value="" /></div>
    <fieldset class="mt-2" style="border:1px solid var(--border);border-radius:8px;padding:12px;">
        <legend style="color:var(--text-secondary);font-size:0.9rem;font-weight:600;">Для входа в личный кабинет</legend>
        <div class="form__group"><label class="form__label">Логин</label><input class="form__input" type="text" name="login" value="" /></div>
        <div class="form__group"><label class="form__label">Пароль</label><input class="form__input" type="password" name="password" value="" /></div>
    </fieldset>
    <div class="form__actions">
        <button class="btn btn--primary" type="submit">Сохранить</button>
        <a class="btn btn--secondary" href="/clients">Отмена</a>
    </div>
</form>

{% endblock %}
