{% extends "base.html" %}

{% block content %}



<div style="max-width:400px;margin:0 auto;">
    {% if error %}
    <div class="alert alert--error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" class="form">
        {{ csrf_input(request) }}
        <div class="form__group">
            <label class="form__label">Логин/Телефон/Почта</label>
            <input class="form__input" type="text" name="login" required />
        </div>
        <div class="form__group">
            <label class="form__label">Пароль</label>
            <input class="form__input" type="password" name="password" required />
        </div>
        <button class="btn btn--primary" type="submit">Войти</button>
    </form>

    <p class="mt-2 text-center"><a href="/register" class="header__nav-link">Зарегистрироваться</a></p>
</div>

{% endblock %}
