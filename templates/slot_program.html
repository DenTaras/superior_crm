{% extends "base.html" %}

{% block content %}

<div class="page-title">
    <h1>Программа для слота {{ slot.start_time.strftime('%d.%m %H:%M') }}</h1>
</div>

<div id="slot-program"
     data-slot-id="{{ slot.id }}"
     data-week-offset="{{ week_offset }}"
     style="display:flex;gap:16px;align-items:flex-start;">

    <div style="width:260px;">
        <h3>Клиенты</h3>
        <ul id="clients-list" class="client-list">
            {% for c in clients %}
            <li data-client-id="{{ c.id }}" class="client-item">{{ c.fio() }}</li>
            {% endfor %}
        </ul>
        <a class="btn" href="/slot/{{ slot.id }}?week_offset={{ week_offset }}">Назад к слоту</a>
    </div>

    <div style="flex:1;">
        <h3>Описание тренировки</h3>
        <textarea id="note-text" class="field" style="width:100%;height:320px;"></textarea>
        <div style="margin-top:8px;display:flex;gap:8px;align-items:center;">
            <span id="save-status" class="muted">Автосохранение включено</span>
        </div>
    </div>
</div>

<script id="notes-data" type="application/json">{{ notes_json|replace('</script>', '<\\/script>')|safe }}</script></script>

<script>
(function(){
    var slotProgram = document.getElementById('slot-program');
    var slotId = slotProgram.getAttribute('data-slot-id');

    var notesEl = document.getElementById('notes-data');
    var notes = {};
    try { notes = JSON.parse(notesEl.textContent); } catch(e) {}

    var clients = Array.from(document.querySelectorAll('.client-item'));
    var selected = null;
    var textarea = document.getElementById('note-text');
    var status = document.getElementById('save-status');

    function doSave(clientId){
        if(!clientId) return Promise.resolve();
        status.textContent = 'Сохранение...';
        var fd = new FormData();
        fd.append('client_id', clientId);
        fd.append('text', textarea.value || '');
        return fetch('/slot/' + slotId + '/program/save', { method: 'POST', body: fd }).then(function(r){ return r.json(); }).then(function(j){
            notes[clientId] = textarea.value || '';
            status.textContent = 'Сохранено';
            setTimeout(function(){ status.textContent = 'Автосохранение включено'; }, 900);
        }).catch(function(){ status.textContent = 'Ошибка сохранения'; });
    }

    function selectClient(el){
        clients.forEach(function(it){ it.classList.remove('selected'); });
        el.classList.add('selected');
        selected = el.getAttribute('data-client-id');
        textarea.value = notes[selected] || '';
        textarea.focus();
    }

    var timeout = null;
    var pendingClient = null;
    clients.forEach(function(el, idx){
        el.addEventListener('click', function(){
            if(timeout){
                clearTimeout(timeout);
                timeout = null;
                if(selected){
                    pendingClient = selected;
                }
            }
            var doSwitch = function(){
                selectClient(el);
            };
            if(pendingClient){
                doSave(pendingClient).then(function(){ pendingClient = null; doSwitch(); }).catch(function(){ pendingClient = null; doSwitch(); });
            } else {
                doSwitch();
            }
        });
        if(idx === 0) selectClient(el);
    });

    textarea.addEventListener('input', function(){
        status.textContent = 'Сохранение...';
        if(timeout) clearTimeout(timeout);
        timeout = setTimeout(function(){
            var clientId = selected;
            timeout = null;
            doSave(clientId);
        }, 300);
    });

    window.addEventListener('beforeunload', function(e){
        if(timeout) { clearTimeout(timeout); timeout = null; }
        if(selected){
            var blob = new Blob([new URLSearchParams({client_id: selected, text: textarea.value})], { type: 'application/x-www-form-urlencoded' });
            if(navigator.sendBeacon){
                navigator.sendBeacon('/slot/' + slotId + '/program/save', blob);
            }
        }
    });
})();
</script>

{% endblock %}
