{% extends "base.html" %}

{% block content %}

<div class="page__title"><h1>Программа для слота {{ slot.start_time.strftime('%d.%m %H:%M') }}</h1></div>

<div id="slot-program"
     data-slot-id="{{ slot.id }}"
     data-week-offset="{{ week_offset }}"
     class="program__layout">

    <div class="program__sidebar">
        <h3>Клиенты</h3>
        <ul id="clients-list" class="client-list">
            {% for c in clients %}
            <li data-client-id="{{ c.id }}" class="client-list__item client-list__item--interactive">{{ c.fio() }}</li>
            {% endfor %}
        </ul>
        <a class="btn btn--ghost mt-2" href="/slot/{{ slot.id }}?week_offset={{ week_offset }}">Назад к слоту</a>
    </div>

    <div class="program__editor">
        <h3>Описание тренировки</h3>
        <textarea id="note-text" class="form__textarea" style="height:320px;"></textarea>
        <div class="flex-row mt-1">
            <span id="save-status" class="text-muted">Автосохранение включено</span>
        </div>
    </div>
</div>

<script id="notes-data" type="application/json">{{ notes_json|replace('</script>', '<\/script>')|safe }}</script>

<script>
(function(){
    var slotProgram = document.getElementById('slot-program');
    var slotId = slotProgram.getAttribute('data-slot-id');

    var notesEl = document.getElementById('notes-data');
    var notes = {};
    try { notes = JSON.parse(notesEl.textContent); } catch(e) {}

    var clients = Array.from(document.querySelectorAll('.client-list__item--interactive'));
    var selected = null;
    var textarea = document.getElementById('note-text');
    var status = document.getElementById('save-status');

    function doSave(clientId){
        if(!clientId) return Promise.resolve();
        status.textContent = 'Сохранение...';
        return fetch('/slot/' + slotId + '/program/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ client_id: clientId, text: textarea.value || '' })
        }).then(function(r){ return r.json(); }).then(function(j){
            notes[clientId] = textarea.value || '';
            status.textContent = 'Сохранено';
            setTimeout(function(){ status.textContent = 'Автосохранение включено'; }, 900);
        }).catch(function(){ status.textContent = 'Ошибка сохранения'; });
    }

    function selectClient(el){
        clients.forEach(function(it){ it.classList.remove('client-list__item--selected'); });
        el.classList.add('client-list__item--selected');
        selected = el.getAttribute('data-client-id');
        textarea.value = notes[selected] || '';
        textarea.focus();
    }

    var timeout = null;
    var pendingClient = null;
    clients.forEach(function(el, idx){
        el.addEventListener('click', function(){
            if(timeout){
                clearTimeout(timeout);
                timeout = null;
                if(selected){
                    pendingClient = selected;
                }
            }
            var doSwitch = function(){
                selectClient(el);
            };
            if(pendingClient){
                doSave(pendingClient).then(function(){ pendingClient = null; doSwitch(); }).catch(function(){ pendingClient = null; doSwitch(); });
            } else {
                doSwitch();
            }
        });
        if(idx === 0) selectClient(el);
    });

    textarea.addEventListener('input', function(){
        status.textContent = 'Сохранение...';
        if(timeout) clearTimeout(timeout);
        timeout = setTimeout(function(){
            var clientId = selected;
            timeout = null;
            doSave(clientId);
        }, 300);
    });

    window.addEventListener('beforeunload', function(e){
        if(timeout) { clearTimeout(timeout); timeout = null; }
        if(selected){
            var csrfToken = (document.querySelector('input[name="_csrf_token"]') || {}).value || '';
            var params = new URLSearchParams({client_id: selected, text: textarea.value, _csrf_token: csrfToken});
            var blob = new Blob([params], { type: 'application/x-www-form-urlencoded' });
            if(navigator.sendBeacon){
                navigator.sendBeacon('/slot/' + slotId + '/program/save', blob);
            }
        }
    });
})();
</script>

{% endblock %}
