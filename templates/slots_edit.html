{% extends "base.html" %}

{% block content %}

<h1>Редактировать слот</h1>

<form method="post" action="/slots/edit/{{ slot.id }}" class="form-row">
    <label class="label">Время (YYYY-MM-DDTHH:MM)</label>
    <input class="field" type="text" name="start_time" value="{{ slot.start_time.strftime('%Y-%m-%dT%H:%M') }}" required />
    <label class="label">Вместимость</label>
    <select name="capacity" class="field">
        <option value="1" {% if slot.capacity == 1 %}selected{% endif %}>1</option>
        <option value="2" {% if slot.capacity == 2 %}selected{% endif %}>2</option>
        <option value="3" {% if slot.capacity == 3 %}selected{% endif %}>3</option>
        <option value="4" {% if slot.capacity == 4 %}selected{% endif %}>4</option>
    </select>
    <button class="btn">Сохранить</button>
</form>

<form method="post" action="/slots/delete/{{ slot.id }}" onsubmit="return confirm('Удалить слот?');">
    <button class="btn btn--small">Удалить слот</button>
</form>

{% endblock %}
