{% extends "base.html" %}

{% block content %}

<h1>Сменить пароль</h1>

{% if success %}
<div class="panel" style="border-color:var(--accent);margin-bottom:12px;">
    <p style="color:var(--accent);">{{ success }}</p>
</div>
<p class="mt-2"><a href="/profile" class="btn btn--primary">Вернуться в личный кабинет</a></p>
{% else %}

{% if error %}
<div class="panel" style="border-color:var(--danger);margin-bottom:12px;">
    <p style="color:var(--danger);">{{ error }}</p>
</div>
{% endif %}

<form method="post" action="/change-password" class="form" style="max-width:400px;">
    {{ csrf_input(request) }}
    <div class="form__group">
        <label class="form__label">Старый пароль</label>
        <input class="form__input" type="password" name="old_password" required />
    </div>
    <div class="form__group">
        <label class="form__label">Новый пароль</label>
        <input class="form__input" type="password" name="new_password" required minlength="3" />
    </div>
    <div class="form__group">
        <label class="form__label">Повторите новый пароль</label>
        <input class="form__input" type="password" name="new_password2" required minlength="3" />
    </div>
    <div class="form__actions">
        <button class="btn btn--primary" type="submit">Сменить пароль</button>
        <a class="btn btn--secondary" href="/profile">Отмена</a>
    </div>
</form>

{% endif %}

{% endblock %}
