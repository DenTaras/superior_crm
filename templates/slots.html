{% extends "base.html" %}

{% block content %}

<div class="page-title">
    <h1>Слоты</h1>
</div>

<ul class="client-list">
{% for slot in slots %}
    <li>
        <div>
            <strong><a href="/slot/{{ slot.id }}">{{ slot.start_time.strftime('%d.%m %H:%M') }}</a></strong>
        </div>
        <div class="muted">Вместимость: {{ slot.capacity }}</div>
        <div>
            <a class="btn btn--small" href="/slots/edit/{{ slot.id }}">Редактировать</a>
        </div>
    </li>
{% endfor %}
</ul>

<h3>Добавить слот</h3>

<form method="post" action="/slots/add" class="form-row">
    <label class="label">Время (YYYY-MM-DDTHH:MM)</label>
    <input class="field" type="text" name="start_time" value="{{ default_time }}" required />
    <label class="label">Вместимость</label>
    <select name="capacity" class="field">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
    </select>
    <button class="btn">Добавить</button>
</form>

{% endblock %}
