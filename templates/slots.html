{% extends "base.html" %}

{% block content %}

<div class="page-title">
    <h1>Слоты</h1>
</div>

<ul class="client-list">
{% for slot in slots %}
    <li>
        <div>
            <strong><a href="/slot/{{ slot.id }}">{{ slot.start_time.strftime('%d.%m %H:%M') }}</a></strong>
        </div>
        <div class="muted">Вместимость: {{ slot.capacity }}</div>
        <div>
            <a class="small-btn" href="/slots/edit/{{ slot.id }}">Редактировать</a>
        </div>
        <!-- <form method="post" action="/slots/delete/{{ slot.id }}" style="display:inline" onsubmit="return confirm('Удалить слот? Это удалит все бронирования.');">
            <button class="small-btn">Удалить</button>
        </form> -->
    </li>
{% endfor %}
</ul>

<h3>Добавить слот</h3>

<form method="post" action="/slots/add">
    <label>Время (YYYY-MM-DDTHH:MM)</label>
    <input type="text" name="start_time" value="{{ default_time }}" required />
    <label>Вместимость</label>
    <select name="capacity">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
    </select>
    <button>Добавить</button>
</form>

{% endblock %}
