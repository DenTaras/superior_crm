{% extends "base.html" %}

{% block content %}


<div style="max-width:400px;margin:0 auto;">
    {% if error %}
    <div class="alert alert--error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/register" class="form">
        {{ csrf_input(request) }}
        <div class="form__group">
            <label class="form__label">Логин</label>
            <input class="form__input" type="text" name="login" required />
        </div>
        <div class="form__group">
            <label class="form__label">Пароль</label>
            <input class="form__input" type="password" name="password" required />
        </div>
        <div class="form__group">
            <label class="form__label">Имя</label>
            <input class="form__input" type="text" name="first_name" required />
        </div>
        <div class="form__group">
            <label class="form__label">Фамилия</label>
            <input class="form__input" type="text" name="last_name" />
        </div>
        <div class="form__group">
            <label class="form__label">Телефон</label>
            <input class="form__input" type="text" name="phone" />
        </div>
        <div class="form__group" style="margin-top:12px;">
            <label class="form__label" style="font-size:0.85rem;font-weight:400;gap:8px;display:flex;align-items:flex-start;">
                <input type="checkbox" name="pd_consent" value="true" required style="margin-top:2px;">
                Я согласен на <a href="/privacy" target="_blank">обработку персональных данных</a>
            </label>
        </div>
        <button class="btn btn--primary" type="submit">Зарегистрироваться</button>
    </form>

    <p class="mt-2 text-center">Уже есть аккаунт? <a href="/login" class="header__nav-link">Войти</a></p>
</div>

{% endblock %}
