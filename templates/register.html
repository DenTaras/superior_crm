{% extends "base.html" %}

{% block content %}

<div class="page-title">
    <h1>Регистрация</h1>
</div>

<div style="max-width:400px;margin:0 auto;">
    {% if error %}
    <div class="flash flash--error" style="padding:12px;background:#fdd;border-radius:6px;margin-bottom:16px;">
        {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/register" class="form-stack" style="display:flex;flex-direction:column;gap:12px;">
        {{ csrf_input(request) }}
        <label>
            Логин
            <input class="field" type="text" name="login" required style="width:100%;" />
        </label>
        <label>
            Пароль
            <input class="field" type="password" name="password" required style="width:100%;" />
        </label>
        <label>
            Имя
            <input class="field" type="text" name="first_name" required style="width:100%;" />
        </label>
        <label>
            Фамилия
            <input class="field" type="text" name="last_name" style="width:100%;" />
        </label>
        <label>
            Телефон
            <input class="field" type="text" name="phone" style="width:100%;" />
        </label>
        <button class="btn" type="submit">Зарегистрироваться</button>
    </form>

    <p style="margin-top:16px;text-align:center;">
        Уже есть аккаунт? <a href="/login">Войти</a>
    </p>
</div>

{% endblock %}
