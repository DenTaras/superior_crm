{% extends "base.html" %}

{% block content %}

<div class="page-title">
    <h1>Клиенты</h1>
</div>

<div style="margin-top:16px;">
    <a class="btn" href="/clients/create">Добавить</a>
</div>
<br>

<div class="page-controls">
    <form method="get" action="/clients" class="form-row" style="flex-direction:row;gap:8px;align-items:center;">
        <input class="field" type="search" name="q_name" placeholder="Поиск по ФИО" value="{{ q_name or '' }}" />
        <input class="field" type="search" name="q_phone" placeholder="Поиск по телефону" value="{{ q_phone or '' }}" />
        <button class="btn btn--small" type="submit">Фильтр</button>
        <a class="btn btn--ghost btn--small" href="/clients">Сброс</a>
    </form>
</div>

<div class="clients-list">
    <div class="clients-table-wrapper">
    <table class="clients-table">
        <thead>
            <tr><th>ФИО</th><th>Телефон</th><th></th></tr>
        </thead>
        <tbody>
        {% for client in clients %}
            <tr>
                <td>{{ client.fio() }}</td>
                <td>{{ client.phone|format_phone }}</td>
                <td>
                    <a class="btn btn--small" href="/clients/edit/{{ client.id }}">Редактировать</a>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
    </div>
</div>



{% endblock %}
