{% extends "base.html" %}

{% block content %}

<div class="page__title"><h1>Записаться на тренировку</h1></div>

<p class="text-secondary mb-3">Заполните форму, и мы свяжемся с вами для уточнения деталей.</p>

<form method="post" action="/signup" class="form" style="max-width:500px;">
    {{ csrf_input(request) }}
    <div class="form__group">
        <label class="form__label">Имя *</label>
        <input class="form__input" type="text" name="first_name" required />
    </div>
    <div class="form__group">
        <label class="form__label">Фамилия</label>
        <input class="form__input" type="text" name="last_name" />
    </div>
    <div class="form__group">
        <label class="form__label">Телефон</label>
        <input class="form__input" type="tel" name="phone" />
    </div>
    <div class="form__group">
        <label class="form__label">Цель тренировок</label>
        <textarea class="form__textarea" name="goal" rows="3" placeholder="Например: похудеть, набрать мышечную массу, улучшить выносливость"></textarea>
    </div>
    <div class="form__group">
        <label class="form__label">Предпочитаемое время</label>
        <input class="form__input" type="text" name="preferred_time" placeholder="Например: утро будних дней, вечер после 18:00" />
    </div>
    <button class="btn btn--primary" type="submit">Отправить заявку</button>
</form>

{% endblock %}
